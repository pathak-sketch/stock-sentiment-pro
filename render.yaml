services:
  # Backend API Service
  - type: web
    name: stock-sentiment-api
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn dashboard.backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stock-sentiment-db
          property: connectionString
      - key: TWITTER_API_KEY
        sync: false
      - key: TWITTER_API_SECRET
        sync: false
      - key: TWITTER_ACCESS_TOKEN
        sync: false
      - key: TWITTER_ACCESS_SECRET
        sync: false
      - key: ENVIRONMENT
        value: production

  # Frontend Static Site
  - type: web
    name: stock-sentiment-dashboard
    runtime: static
    region: singapore
    plan: free
    buildCommand: cd dashboard/frontend && npm install && npm run build
    staticPublishPath: ./dashboard/frontend/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://stock-sentiment-api.onrender.com

databases:
  - name: stock-sentiment-db
    plan: free
    region: singapore
    databaseName: stock_sentiment
    user: stock_user
